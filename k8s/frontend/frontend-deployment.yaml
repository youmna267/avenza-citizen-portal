# ═══════════════════════════════════════════════════════════
#  Avenza — Frontend (Next.js) Deployment
#  2 replicas. Next.js standalone output is stateless —
#  safe to scale horizontally.
# ═══════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: avenza
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: avenza-citizen-portal
  annotations:
    kubernetes.io/change-cause: "Initial deployment"
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
        app.kubernetes.io/name: frontend
    spec:
      initContainers:
        - name: wait-for-backend
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for backend..."
              until nc -z backend-service 4000; do
                sleep 3
              done
              echo "Backend is ready."
      containers:
        - name: frontend
          # ⚠️  Replace with your actual image:
          #     docker build -t your-registry/avenza-frontend:latest ./frontend
          #     docker push your-registry/avenza-frontend:latest
          image: avenza-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: frontend-config
          env:
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: "0.0.0.0"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /
              port: 3000
            failureThreshold: 12
            periodSeconds: 5

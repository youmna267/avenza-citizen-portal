  POSTGRES_DB: Y2l0aXplbl9wb3J0YWw=
  # echo -n "citizen_user" | base64
  POSTGRES_USER: Y2l0aXplbl91c2Vy
  # echo -n "CitizenPortal2026Secure" | base64
  POSTGRES_PASSWORD: Q2l0aXplblBvcnRhbDIwMjZTZWN1cmU=
